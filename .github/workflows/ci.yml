name: SolPilot Continuous Integration & Deployment

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: solpilot_test
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: solpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Verify Prisma Generation
      env:
        DATABASE_URL: postgresql://solpilot_test:testpassword@localhost:5432/solpilot_test?schema=public
      run: |
        npx prisma generate

    - name: Verify TypeScript Compilation
      run: npm run build

    - name: Build Docker Production Image
      run: |
        docker build -t solpilot:latest .
